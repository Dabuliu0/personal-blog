<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" role="img" aria-labelledby="title desc">
  <title id="title">石九的抽象头像</title>
  <desc id="desc">由深色石块和粉色光晕组成的圆形抽象图形</desc>
  <defs>
    <radialGradient id="glow" cx="34%" cy="24%" r="82%">
      <stop offset="0" stop-color="#ff8ac9"/>
      <stop offset="0.48" stop-color="#fe4aab"/>
      <stop offset="1" stop-color="#b91f72"/>
    </radialGradient>
    <linearGradient id="stone" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#272731"/>
      <stop offset="1" stop-color="#09090d"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="14" stdDeviation="13" flood-color="#260015" flood-opacity=".45"/>
    </filter>
  </defs>
  <circle cx="160" cy="160" r="158" fill="url(#glow)"/>
  <circle cx="160" cy="160" r="135" fill="none" stroke="#ffffff" stroke-opacity=".16" stroke-width="2"/>
  <g filter="url(#shadow)">
    <path d="M88 188c-9-35 8-74 42-92 38-20 88-4 104 36 14 35-2 75-37 94-41 22-97 4-109-38Z" fill="url(#stone)"/>
    <path d="M112 112c19-24 57-33 86-19 21 11 35 32 37 56-34-16-83-10-124 25-8-20-8-43 1-62Z" fill="#343440" opacity=".72"/>
    <path d="M123 204c28 18 69 16 96-7" fill="none" stroke="#ffffff" stroke-opacity=".52" stroke-linecap="round" stroke-width="5"/>
    <circle cx="202" cy="129" r="8" fill="#f9f9fb"/>
  </g>
</svg>
